  <style>
    /* Default theme: Classic (white) */
    :root{
      --bg: #ffffff;
      --card: #f8f8f8;
      --text: #111827;
      --accent: #1f2937;
      --btn: #FF9900;
      --btn-text: #fff;
      --green: #27ae60;
      --whatsapp: #25D366;
      --price: #B12704;
    }

    body[data-theme="classic"]{ background:var(--bg); color:var(--text); }

    html,body{ height:100%; margin:0; padding:0; box-sizing:border-box; font-family: Arial, Helvetica, sans-serif; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
    body{ text-align:center; padding-bottom:84px; }

    .top-media{ width:100%; max-height:220px; overflow:hidden; background:transparent; }
    .logo-media{ width:100%; height:auto; object-fit:cover; max-height:200px; display:block; margin:0 auto; }

    h1{ margin:10px 0 4px; font-size:20px; color:var(--accent); }
    #count{ font-size:14px; color:var(--green); font-weight:700; margin-bottom:8px; }

    /* Product grid: mobile-first 2 columns, desktop 3 columns */
    .product-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; padding:10px; max-width:1100px; margin:0 auto; }
    @media (min-width:1024px){ .product-grid{ grid-template-columns:repeat(3,1fr); } }

    .product-card{ background:var(--card); border-radius:10px; overflow:hidden; display:flex; flex-direction:column; min-height:320px; text-align:left; }
    .thumb{ width:100%; height:180px; background:#222; overflow:hidden; display:block; }
    .thumb img{ width:100%; height:100%; object-fit:cover; display:block; cursor:pointer; }

    .product-body{ padding:10px; display:flex; flex-direction:column; flex:1; }
    .product-body h3{ margin:0 0 6px; font-size:15px; color:var(--text); }
    .price-row{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .old-price{ text-decoration:line-through; color:var(--price); font-weight:700; font-size:13px; }
    .price{ color:var(--green); font-weight:800; font-size:14px; }
    .discount-timer{ color:var(--btn); font-weight:700; font-size:13px; margin-top:6px; }
    .stars{ color:#ffd54a; margin:8px 0; font-size:14px; }

    .btn-row{ display:flex; gap:8px; justify-content:space-between; margin-top:auto; }
    .btn-row a, .btn-row button{ flex:1 1 48%; padding:10px; border-radius:8px; border:0; font-weight:700; cursor:pointer; text-decoration:none; color:var(--btn-text); display:inline-flex; align-items:center; justify-content:center; }
    .inquiry-btn{ background:var(--whatsapp); color:#fff; }
    .buy-btn{ background:var(--btn); color:var(--btn-text); }
    .buy-btn[disabled]{ opacity:.55; cursor:not-allowed; }

    /* Details overlay */
    .details-panel{ position:fixed; inset:0; display:none; align-items:flex-start; justify-content:center; background:rgba(0,0,0,.9); z-index:99999; padding:18px; overflow:auto; }
    .details-inner{ width:100%; max-width:1100px; background:var(--card); color:var(--text); border-radius:10px; padding:18px; display:flex; gap:18px; align-items:flex-start; flex-wrap:wrap; position:relative; max-height:calc(100vh - 40px); overflow:auto; }
    .details-left{ flex:1 1 420px; text-align:center; }
    .details-left .main-image{ max-width:100%; max-height:calc(100vh - 220px); object-fit:contain; border-radius:8px; display:block; margin:0 auto; }
    .thumbs{ display:flex; gap:8px; margin-top:12px; overflow:auto; justify-content:center; padding-bottom:6px; }
    .thumbs img{ width:72px; height:56px; object-fit:cover; border-radius:6px; }
    .thumb { position: relative; display: inline-block; }

.badge {
  position: absolute;
  font-weight: 700;
  font-size: 12px;
  padding: 6px 8px;
  border-radius: 8px;
  white-space: nowrap;
  animation: zoomInOut 2s infinite alternate;
}

/* Stack badges vertically with a small gap */
.save-badge {
  top: 8px;
  left: 8px;
  background: #fff;
  color: #7b3aed;
  margin-bottom: 4px;
}

.negotiable-badge {
  top: 8px;
  right: 8px;
  background: #7b3aed;
  color: #fff;
}

/* If both exist, adjust top of the second badge */
.thumb .save-badge + .negotiable-badge {
  top: 36px; /* pushes down so no overlap */
}

@keyframes zoomInOut {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}
    .img-nav{ position:absolute; top:50%; transform:translateY(-50%); font-size:26px; color:#fff; background:rgba(0,0,0,.28); padding:8px 10px; border-radius:8px; cursor:pointer; user-select:none; }
    .img-nav.left{ left:8px; } .img-nav.right{ right:8px; }

    .details-right{ flex:1 1 360px; text-align:left; }
    .details-right h2{ margin:0 0 8px; font-size:22px; color:var(--accent); }
    .details-right .desc{ margin-top:12px; line-height:1.6; color:var(--text); }
    .details-actions{ display:flex; gap:10px; margin-top:12px; }

    .close-btn{ position:absolute; right:18px; top:12px; background:transparent; border:2px solid rgba(0,0,0,0.08); color:var(--text); padding:6px 10px; border-radius:8px; cursor:pointer; }

    /* bottom nav */
    .bottom-nav{ position:fixed; left:0; right:0; bottom:0; z-index:99998; height:64px; display:flex; justify-content:space-around; align-items:center; background:var(--card); border-top:1px solid rgba(0,0,0,0.06); box-shadow:0 -6px 18px rgba(0,0,0,0.08); padding:6px 10px; }
    .bottom-nav a, .bottom-nav button{ background:transparent; border:0; font-size:16px; color:var(--accent); font-weight:700; cursor:pointer; display:flex; align-items:center; gap:8px; }
    .cart-badge{ background:#ff3b30; color:#fff; border-radius:50%; padding:2px 7px; font-size:12px; margin-left:6px; display:inline-block; }

    @media (max-width:420px){
      .product-grid{ grid-template-columns:repeat(2,1fr); gap:8px; padding:8px; }
      .logo-media{ max-height:120px; object-fit:cover; }
      .details-inner{ padding:12px; max-height: calc(100vh - 20px); }
      .details-left .main-image{ max-height: calc(100vh - 160px); }
    }

<style>

.inquiry-btn{
display:block;

<h1>Egypt Sofas</h1>
<strong>Upgrade your living room with our luxurious Egypt sofas.</strong><br>
Perfect for modern and elegant interiors.<br>
<strong>Shop exclusive collections from V-Best Luxury Interiors today.</strong>

<div id="count"><span class="spinner"></span> Loading products...</div>

<div id="products" class="product-grid"></div>

<a href="sofas.html" style="display:block;margin:14px 0;color:var(--accent);text-decoration:none;font-weight:700;">
⬅ Back to Categories
</a>

<div class="bottom-nav">
<a href="index.html">🏠 Home</a>
<a href="cart.html">🛒 Cart <span id="cart-count-bottom" class="cart-badge" style="display:none">0</span></a>
</div>

<script>

const SHEET_CSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4YXFvxl_w447wVuWRrHv8EInZFg1lSIX2_KwxZQJL9n8YHEzIP5WmfBep4yBgfN7EbArsjPPHOzOh/pub?output=csv";
const DISCOUNT_DURATION_MS=30*24*60*60*1000;

function escapeHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escJS(s){return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function normKey(k){return String(k||'').toLowerCase().replace(/[^a-z0-9]/g,'');}

function parseCSVRow(t){
const r=[];let c='',q=false;
for(let i=0;i<t.length;i++){
const x=t[i];
if(q){
if(x==='"'){if(t[i+1]==='"'){c+='"';i++;}else q=false;}
else c+=x;
}else{
if(x==='"')q=true;
else if(x===','){r.push(c);c='';}
else c+=x;
}}
r.push(c);
return r;
}

function parseNumber(s){
if(!s)return NaN;
const n=String(s).replace(/[^\d.-]/g,'');
return n===''?NaN:parseFloat(n);
}

function formatNaira(n){
return isNaN(n)?'':'₦'+Math.round(n).toLocaleString();
}

const countEl=document.getElementById('count');
const container=document.getElementById('products');
const cartBadge=document.getElementById('cart-count-bottom');

function updateCartCount(){
const cart=JSON.parse(localStorage.getItem('cart')||'[]');
if(cart.length){
cartBadge.style.display='inline-block';
cartBadge.textContent=cart.length;
}else cartBadge.style.display='none';
}

function addToCart(name,price,image){
if(!image)return;
const cart=JSON.parse(localStorage.getItem('cart')||'[]');
cart.push({name,price,image,qty:1});
localStorage.setItem('cart',JSON.stringify(cart));
updateCartCount();
}

updateCartCount();

(async function(){

try{

const csv=await fetch(SHEET_CSV).then(r=>r.text());
const lines=csv.replace(/^\uFEFF/,'').split(/\r?\n/).filter(l=>l.trim());
const headers=parseCSVRow(lines[0]);

const map={};
headers.forEach((h,i)=>map[normKey(h)]=i);
const gi=n=>map[normKey(n)];

const idI=gi('id');
const catI=gi('category');
const nameI=gi('productname');
const priceI=gi('price');
const discI=gi('discountprice');
const negI=gi('negotiable');
const imgI=gi('imagelink');

const products=[];

for(let i=1;i<lines.length;i++){

const c=parseCSVRow(lines[i]);
const g=i=>c[i]?c[i].trim():'';

const category=g(catI).toLowerCase();
if(!category.includes('egypt')) continue;

const priceNum=parseNumber(g(priceI));
const discNum=parseNumber(g(discI));

const hasPrice=!isNaN(priceNum);
const hasDiscount=!isNaN(discNum);

const imgs=g(imgI).split(/[\n,]+/).map(s=>s.trim()).filter(Boolean);
const hasImage=imgs.length>0;

const saveAmount=(hasPrice && hasDiscount)?priceNum-discNum:NaN;
const showSave=(hasPrice && hasDiscount);

const negotiableValue=g(negI).toLowerCase();
const isNegotiable=['yes','true','1','negotiable'].includes(negotiableValue);

const showTimer=(hasImage && hasPrice && hasDiscount);

products.push({
id:g(idI),
name:g(nameI),
priceStr:g(priceI),
discStr:g(discI),
firstImage:imgs[0]||'',
hasImage,
hasDiscount,
showTimer,
showSave,
saveAmount,
isNegotiable,
endTime:Date.now()+DISCOUNT_DURATION_MS
});
}

countEl.textContent=`Total Egypt Sofas Available: ${products.length}`;
container.innerHTML='';

products.forEach((p,idx)=>{

const inquiry=`https://wa.me/2347080535579?text=`+encodeURIComponent(`Hello, I'm interested in ${p.name}`);
const link=`product.html?id=${p.id}`;

const card=document.createElement('div');
card.className='product-card';

if(p.hasImage){

card.innerHTML=`

<span class="thumb" onclick="location.href='${link}'">

<img src="${escapeHtml(p.firstImage)}">

<div class="badge-left">
${p.showSave?`<div class="badge save-badge">Save ${formatNaira(p.saveAmount)}</div>`:''}
</div>

<div class="badge-right">
${p.isNegotiable?`<div class="badge negotiable-badge">Negotiable</div>`:''}
</div>

</span>

<div class="product-body">

<a href="${link}" style="text-decoration:none;color:inherit">
<h3>${escapeHtml(p.name)}</h3>
</a>

${p.hasDiscount
?`<div class="old-price">${escapeHtml(p.priceStr)}</div><div class="price">${escapeHtml(p.discStr)}</div>`
:`<div class="price">${escapeHtml(p.priceStr)}</div>`}

${p.showTimer?`<div class="discount-timer" data-i="${idx}"></div>`:''}

<div style="display:flex;flex-direction:column;gap:6px">

<button class="buy-btn"
onclick="addToCart('${escJS(p.name)}','${escJS(p.hasDiscount?p.discStr:p.priceStr)}','${escJS(p.firstImage)}')">
🛒 Add to Cart
</button>

<a class="inquiry-btn" href="${inquiry}" target="_blank">
📩 Inquiry
</a>

</div>

</div>
`;

}else{

card.innerHTML=`

<span style="display:flex;align-items:center;justify-content:center;background:#f0f0f0;height:180px;color:#ff3b30;font-weight:700;">
Product out of stock
</span>

<div class="product-body">

<h3>${escapeHtml(p.name)}</h3>

<div class="price">${p.priceStr?escapeHtml(p.priceStr):''}</div>

<div style="display:flex;flex-direction:column;gap:6px">

<button class="buy-btn" disabled>🛒 Add to Cart</button>

<a class="inquiry-btn" href="${inquiry}" target="_blank">
📩 Inquiry
</a>

</div>

</div>
`;
}

container.appendChild(card);

});

setInterval(()=>{

document.querySelectorAll('.discount-timer').forEach(el=>{

const p=products[el.dataset.i];
if(!p.showTimer) return;

const diff=p.endTime-Date.now();

if(diff<=0){
el.textContent='Offer ended';
return;
}

const d=Math.floor(diff/86400000);
const h=Math.floor(diff%86400000/3600000);
const m=Math.floor(diff%3600000/60000);
const s=Math.floor(diff%60000/1000);

el.textContent=`Ends in ${d}d ${h}h ${m}m ${s}s`;

});

},1000);

}catch(e){

console.error(e);
countEl.textContent='Failed to load products';

}

})();

</script>


<div id="loader" style="
  position:fixed;inset:0;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:white;font-family:system-ui,sans-serif;
  color:#5b21b6;font-weight:600;font-size:18px;
  transition:opacity .8s ease;">
  <div id="loaderText" style="animation:zoom 2s ease-in-out infinite;">
    Please wait<span id="dots">...</span>
  </div>
  <div id="loaderMsg" style="margin-top:8px;font-size:14px;color:#6b7280;animation:zoom 3s ease-in-out infinite;">
    Preparing your Egypt sofas 🛋️
  </div>
</div>

<style>
body{opacity:1;transition:opacity 1s ease;} /* visible by default */
@keyframes blink{0%,100%{opacity:.2;}50%{opacity:1;}}
#dots{display:inline-block;animation:blink 1.2s infinite;}
@keyframes zoom{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}
</style>

<script>
(function(){
  const loader=document.getElementById('loader');
  const msg=document.getElementById('loaderMsg');

  // Only show loader once per session
  if(sessionStorage.getItem('loaderShown')){
    loader.remove();
    return;
  }

  const lines=[
    "Polishing visuals ✨",
    "Arranging Egypt sofas 🛋️",
    "Almost ready 💫"
  ];
  let i=0;
  const rot=setInterval(()=>{
    i=(i+1)%lines.length;
    msg.textContent=lines[i];
  },1000); // text rotates every 1 second

  setTimeout(()=>{
    clearInterval(rot);
    loader.style.opacity='0';
    setTimeout(()=>{loader.remove();},800);

    // mark loader as shown for this session
    sessionStorage.setItem('loaderShown','true');
  },3000); // loader visible 3 seconds
})();
</script>
</body>
